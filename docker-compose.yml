version: "3.9"

# ============================================================
# ACADEMIA — Stack de despliegue en vast.ai
# Servicios:
#   - backend    → FastAPI + InsightFace (GPU)    :8000
#   - whatsapp   → Baileys bot (Node.js)          :3001
# ============================================================

services:

  # ── Backend de reconocimiento facial ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: academia-backend:latest
    container_name: academia-backend
    restart: unless-stopped

    # Acceso a GPU NVIDIA (soporte vast.ai)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    ports:
      - "8000:8000"

    volumes:
      # Dataset persistente — embeddings faciales
      - ./dataset:/app/dataset
      # Base de datos SQLite
      - ./backend/attendance.db:/app/backend/attendance.db

    env_file:
      - ./backend/.env

    environment:
      - CUDA_VISIBLE_DEVICES=0
      - INSIGHTFACE_CTX_ID=0
      - DATASET_DIR=/app/dataset
      - DB_URL=/app/backend/attendance.db
      # Sobreescribir en producción con la IP/dominio de vast.ai:
      # - CORS_ORIGINS=https://tu-dominio.com

    networks:
      - academia-net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Bot de WhatsApp ────────────────────────────────────────
  whatsapp:
    build:
      context: ./whatsapp-bot
      dockerfile: Dockerfile
    image: academia-whatsapp:latest
    container_name: academia-whatsapp
    restart: unless-stopped

    ports:
      - "3001:3001"

    volumes:
      # ⚠️ CRÍTICO: persiste la sesión de WhatsApp entre reinicios
      - ./whatsapp-bot/baileys_auth_info:/app/baileys_auth_info

    environment:
      - PORT=3001
      - NODE_ENV=production

    networks:
      - academia-net

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  academia-net:
    driver: bridge
